<div class="chart-root">
  <div class="toolbar">
    <span class="symbol">{{ symbol }}</span>
    <div class="interval-buttons" role="group" aria-label="Chart interval">
      <button
        *ngFor="let option of intervals"
        [class.active]="option.value === selectedInterval"
        [attr.aria-pressed]="option.value === selectedInterval"
        (click)="onIntervalChange(option.value)"
      >
        {{ option.label }}
      </button>
    </div>
    <div class="live-indicator" [class.connected]="isConnected" *ngIf="liveStatus">
      <span class="live-dot"></span>
      {{ liveStatus }}
    </div>
  </div>
  <div class="chart-wrapper">
    <div class="chart-container" #chartContainer></div>
    <div class="chart-status" *ngIf="statusMessage">{{ statusMessage }}</div>
  </div>
</div>
