<section class="chart-panel">
  <header class="chart-header">
    <div>
      <p class="eyebrow">Market View</p>
      <h1>Lightweight Candlestick Chart</h1>
    </div>
    <div class="chart-controls">
      <label for="interval-select">Interval</label>
      <select
        id="interval-select"
        [value]="selectedInterval"
        (change)="onIntervalChange($any($event.target).value)"
      >
        <option *ngFor="let interval of intervals" [value]="interval.value">
          {{ interval.label }}
        </option>
      </select>
      <p class="live-status">{{ liveStatus }}</p>
    </div>
  </header>

  <div class="chart-wrapper">
    <div class="chart-container" #chartContainer></div>
    <p class="chart-status" *ngIf="statusMessage">{{ statusMessage }}</p>
  </div>
</section>
