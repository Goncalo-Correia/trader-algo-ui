<div class="chart-root">

  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <div class="chart-toolbar">
    <div class="toolbar-items">
      <button
        *ngFor="let interval of availableIntervals"
        class="toolbar-btn"
        [class.active]="interval.code === selectedInterval"
        (click)="onIntervalChange(interval.code)"
      >{{ interval.code }}</button>

      <div class="toolbar-separator"></div>

      <button class="toolbar-btn" [class.active]="showCurrentSession"  (click)="toggleCurrentSession()">D-OHLC</button>
      <button class="toolbar-btn" [class.active]="showPreviousSession" (click)="togglePreviousSession()">P-OHLC</button>
      <button class="toolbar-btn" [class.active]="showVolumeProfile"   (click)="toggleVolumeProfile()">VP</button>

      <div class="toolbar-separator"></div>

      <button
        *ngFor="let btn of kronosButtons"
        class="toolbar-btn predict-btn"
        [class.predicting]="predictingKey === btn.key"
        [disabled]="predictingKey !== null"
        (click)="runPredict(btn.key)"
      >{{ btn.label }}</button>
    </div>

    <div class="live-indicator" [class.connected]="isConnected" *ngIf="liveStatus">
      <span class="live-dot"></span>
      {{ liveStatus }}
    </div>
  </div>

  <!-- ── Chart area ──────────────────────────────────────────────────────── -->
  <div class="chart-wrapper" [class.adjust-mode]="_adjustMode !== null">
    <div class="chart-container" #chartContainer></div>
    <div class="chart-status" *ngIf="statusMessage">{{ statusMessage }}</div>
  </div>

</div>
