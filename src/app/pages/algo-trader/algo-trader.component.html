<div class="algo-trader-layout" *ngIf="selectedSymbol">

  <div class="chart-area">
    <app-chart
      [symbol]="selectedSymbol"
      [initialInterval]="defaultInterval"
      [availableIntervals]="intervals"
      [activeTrade]="activeTrade"
      [adjustMode]="adjustMode"
      (priceSelected)="onPriceSelected($event)"
    ></app-chart>
  </div>

  <app-trade-panel
    [symbols]="symbols"
    [initialSymbol]="selectedSymbol"
    (symbolChange)="onSymbolChange($event)"
    (tradeChange)="onTradeChange($event)"
    (adjustModeChange)="onAdjustModeChange($event)"
  ></app-trade-panel>

</div>
