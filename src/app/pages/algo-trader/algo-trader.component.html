@if (selectedSymbol) {
  <div class="algo-trader-layout">
    <div class="chart-area">
      <app-chart
        [symbol]="selectedSymbol"
        [symbolProvider]="selectedSymbolProvider"
        [initialInterval]="defaultInterval"
        [availableIntervals]="intervals"
        [activeTrade]="activeTrade"
        [tradingAccountId]="tradingAccountId"
      ></app-chart>
    </div>
    <app-algo-trade-panel
      [symbols]="symbols"
      [intervals]="intervals"
      [initialSymbol]="selectedSymbol"
      [defaultInterval]="defaultInterval"
      (symbolChange)="onSymbolChange($event)"
      (tradeChange)="onTradeChange($event)"
      (accountChange)="onAccountChange($event)"
    ></app-algo-trade-panel>
  </div>
}
