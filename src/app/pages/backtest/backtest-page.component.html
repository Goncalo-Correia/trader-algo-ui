<div class="backtest-layout">
  <!-- ── Chart ──────────────────────────────────────────────────────────── -->
  <div class="chart-area">
    <div class="chart-wrap">
      @if (backtestCandles.length) {
        <app-backtest-chart
          [candles]="backtestCandles"
          [playbackTime]="activePlaybackTime"
          [trades]="backtestTrades"
          [isNySessionOnly]="isNySessionOnly"
        ></app-backtest-chart>
      }
      @if (!backtestCandles.length && !running) {
        <div class="chart-empty">Configure a backtest and click <strong>Run Backtest</strong> to start streaming.</div>
      }
      @if (!backtestCandles.length && running) {
        <div class="chart-empty">Connecting to backtest stream…</div>
      }
    </div>
  </div>

  <!-- ── Control Panel ──────────────────────────────────────────────────── -->
  <app-backtest-trade-panel
    [symbols]="symbols"
    [intervals]="intervals"
    [strategies]="strategies"
    [(selectedSymbol)]="selectedSymbol"
    [(selectedInterval)]="selectedInterval"
    [(selectedStrategy)]="selectedStrategy"
    [(fromDate)]="fromDate"
    [(toDate)]="toDate"
    [(initialBalance)]="initialBalance"
    [(quantity)]="quantity"
    [(stopLoss)]="stopLoss"
    [(takeProfit)]="takeProfit"
    [(breakeven)]="breakeven"
    [(breakevenStop)]="breakevenStop"
    [(fee)]="fee"
    [(isNySessionOnly)]="isNySessionOnly"
    [(delay)]="delay"
    [(dailyProfitGoal)]="dailyProfitGoal"
    [(maxLossesPerDay)]="maxLossesPerDay"
    [(maxCandlesPerTrade)]="maxCandlesPerTrade"
    [running]="running"
    [streamDone]="streamDone"
    [errorMessage]="errorMessage"
    [backtestResult]="backtestResult"
    [backtestCandlesCount]="backtestCandles.length"
    [activePlaybackTime]="activePlaybackTime"
    [backtestTotalPnl]="backtestTotalPnl"
    [activeTrade]="activeTrade"
    [activeTradePnl]="activeTradePnl"
    [breakevenActive]="breakevenActive"
    (runBacktest)="runBacktest()"
  ></app-backtest-trade-panel>
</div>
